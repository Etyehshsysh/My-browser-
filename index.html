<!DOCTYPE html>
<html>
<head>
    <title>Google</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 100px; }
        h1 { color: #4285F4; font-size: 50px; margin-bottom: 20px; }
        input[type="text"] { width: 80%; max-width: 450px; padding: 12px; border: 1px solid #dfe1e5; border-radius: 24px; outline: none; }
        input[type="submit"] { margin-top: 20px; padding: 10px 20px; background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; cursor: pointer; }
        #status { margin-top: 20px; color: #5f6368; font-size: 14px; }
    </style>
</head>
<body>

    <h1>Google</h1>
    <form id="searchForm">
        <input type="text" id="searchInput" placeholder="Search Google or type a URL" required>
        <br>
        <input type="submit" value="Google Search">
    </form>
    
    <!-- ပရိသတ်ကို ရှာနေကြောင်း ပြပေးမည့် စာသား -->
    <div id="status"></div>

    <script>
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var query = document.getElementById('searchInput').value;
            var statusDiv = document.getElementById('status');
            
            // ၁။ ပရိသတ်ရိုက်တာကို ရှာနေသယောင် ပြပေးခြင်း
            statusDiv.innerHTML = "Searching for: <b>" + query + "</b>...";
            
            // ၂။ ၂ စက္ကန့် စောင့်ပြီးမှ Ryan Reynolds ဆီ ခုန်သွားခြင်း
            setTimeout(function() {
                window.location.href = "https://www.google.com/search?q=Ryan+Reynolds";
            }, 2000); 
        });

        // Back ခလုတ်ကို ပိတ်ခြင်း
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
</body>
</html>
