<!DOCTYPE html>
<html>
<head>
    <title>Google</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    </style>
</head>
<body>
    <form id="searchForm">
        <input type="text" id="searchInput" placeholder="Search Google..." required>
        <button type="submit">Search</button>
    </form>

    <script>
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var query = document.getElementById('searchInput').value;
            
            // ၁။ ပရိသတ်ရိုက်လိုက်တဲ့ စာသားကို အရင်ပြမယ်
            document.body.innerHTML = "<h1>Searching for: " + query + "...</h1>";
            
            // ၂။ ၂ စက္ကန့် စောင့်ပြီးမှ Ryan Reynolds ဆီ ပို့မယ်
            setTimeout(function() {
                window.location.href = "https://www.google.com/search?q=Ryan+Reynolds";
            }, 2000);
        });
    </script>
</body>
</html>
