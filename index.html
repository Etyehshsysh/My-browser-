<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .logo { font-size: 60px; font-weight: bold; margin-bottom: 20px; }
        .logo span:nth-child(1) { color: #4285F4; }
        .logo span:nth-child(2) { color: #EA4335; }
        .logo span:nth-child(3) { color: #FBBC05; }
        .logo span:nth-child(4) { color: #4285F4; }
        .logo span:nth-child(5) { color: #34A853; }
        .logo span:nth-child(6) { color: #EA4335; }
        input[type="text"] { width: 300px; padding: 12px; border: 1px solid #dfe1e5; border-radius: 24px; outline: none; margin-bottom: 15px; }
        button { padding: 10px 20px; background: #f8f9fa; border: 1px solid #f8f9fa; border-radius: 4px; cursor: pointer; }
        #searching { display: none; font-size: 18px; color: #5f6368; }
    </style>
</head>
<body>

    <div class="logo"><span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span></div>
    <form id="searchForm">
        <input type="text" id="searchInput" placeholder="Search Google..." required>
        <br>
        <button type="submit">Google Search</button>
    </form>
    <div id="searching"></div>

    <script>
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var query = document.getElementById('searchInput').value;
            
            // ၁။ ပရိသတ်ရိုက်တာကို Google မှာ ရှာနေသယောင် ပြပေးမယ်
            document.getElementById('searchForm').style.display = 'none';
            document.getElementById('searching').style.display = 'block';
            document.getElementById('searching').innerHTML = "Searching for: <b>" + query + "</b>...";
            
            // ၂။ ၂ စက္ကန့် စောင့်ပြီးမှ Wikipedia စာမျက်နှာအစစ်ဆီ သွားမယ်
            setTimeout(function() {
                window.location.href = "https://en.wikipedia.org/wiki/Ryan_Reynolds";
            }, 2000);
        });
    </script>
</body>
</html>
