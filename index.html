<!DOCTYPE html>
<html>
<head>
    <title>Google</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        h1 { color: #4285F4; font-size: 45px; }
        input[type="text"] { width: 80%; max-width: 400px; padding: 10px; }
        input[type="submit"] { margin-top: 20px; padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>Google</h1>
    <form id="searchForm">
        <input type="text" id="searchInput" placeholder="Search...">
        <br>
        <input type="submit" value="Google Search">
    </form>

    <script>
        // Back ခလုတ်ကို ထိန်းချုပ်ခြင်း
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };

        // Search လုပ်ရင် Ryan Reynolds ဆီသွားခြင်း
        document.getElementById('searchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = "https://en.google.org/wiki/Ryan_Reynolds";
        });
    </script>
</body>
</html>
